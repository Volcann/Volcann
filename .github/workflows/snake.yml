name: Generate Snake Animation

on:
  schedule:
    # Run once every 12 hours to avoid wasting GitHub Actions minutes and hitting rate limits
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/snake.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          # Use secrets.SNAKE_PAT (with User: Read-only) for private commits,
          # or secrets.GITHUB_TOKEN if you only want public commits.
          GITHUB_TOKEN: ${{ secrets.SNAKE_PAT }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
